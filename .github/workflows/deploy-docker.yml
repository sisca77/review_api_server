name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Docker 설치 확인 및 설치 (Ubuntu용)
            if ! command -v docker &> /dev/null; then
              echo "Docker 미설치 - 설치 시작"
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            cd /home/ubuntu/review_api_server

            # 코드 최신화 (Private 레포 인증)
            git pull https://${{ secrets.GIT_TOKEN }}@github.com/sisca77/review_api_server.git main

            # Docker 이미지 빌드
            sudo docker build -t review_api_server .

            # 기존 컨테이너 중지 및 삭제
            sudo docker stop review-api || true
            sudo docker rm review-api || true

            fuser -k 8005/tcp || true
            sleep 2
            # 새 컨테이너 실행
            sudo docker run -d --name review-api -p 8005:8005 -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} review_api_server